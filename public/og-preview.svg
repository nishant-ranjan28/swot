<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#fff" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Stock chart line -->
  <polyline points="80,420 150,400 220,410 290,380 360,350 430,370 500,340 570,310 640,330 710,290 780,270 850,250 920,230 990,260 1060,220 1130,200"
    fill="none" stroke="#22c55e" stroke-width="3" opacity="0.3"/>
  <polyline points="80,420 150,400 220,410 290,380 360,350 430,370 500,340 570,310 640,330 710,290 780,270 850,250 920,230 990,260 1060,220 1130,200"
    fill="none" stroke="#22c55e" stroke-width="3" opacity="0.15" stroke-dasharray="5,5" transform="translate(0,30)"/>

  <!-- Glow effect behind chart -->
  <polygon points="80,420 150,400 220,410 290,380 360,350 430,370 500,340 570,310 640,330 710,290 780,270 850,250 920,230 990,260 1060,220 1130,200 1130,500 80,500"
    fill="url(#green)" opacity="0.05"/>

  <!-- App name -->
  <text x="600" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">
    StockPulse
  </text>

  <!-- Tagline -->
  <text x="600" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#9ca3af" text-anchor="middle">
    Indian Stock Research Platform
  </text>

  <!-- Feature pills -->
  <g transform="translate(600, 320)" text-anchor="middle">
    <!-- Row 1 -->
    <rect x="-480" y="-18" width="140" height="36" rx="18" fill="#374151"/>
    <text x="-410" y="7" font-family="system-ui, sans-serif" font-size="14" fill="#d1d5db">Live Markets</text>

    <rect x="-310" y="-18" width="160" height="36" rx="18" fill="#374151"/>
    <text x="-230" y="7" font-family="system-ui, sans-serif" font-size="14" fill="#d1d5db">Technical Analysis</text>

    <rect x="-120" y="-18" width="180" height="36" rx="18" fill="#374151"/>
    <text x="-30" y="7" font-family="system-ui, sans-serif" font-size="14" fill="#d1d5db">Fundamental Scores</text>

    <rect x="90" y="-18" width="120" height="36" rx="18" fill="#374151"/>
    <text x="150" y="7" font-family="system-ui, sans-serif" font-size="14" fill="#d1d5db">Financials</text>

    <rect x="240" y="-18" width="140" height="36" rx="18" fill="#374151"/>
    <text x="310" y="7" font-family="system-ui, sans-serif" font-size="14" fill="#d1d5db">60+ News</text>
  </g>

  <!-- Row 2 pills -->
  <g transform="translate(600, 370)" text-anchor="middle">
    <rect x="-350" y="-18" width="120" height="36" rx="18" fill="#374151"/>
    <text x="-290" y="7" font-family="system-ui, sans-serif" font-size="14" fill="#d1d5db">Dividends</text>

    <rect x="-200" y="-18" width="150" height="36" rx="18" fill="#374151"/>
    <text x="-125" y="7" font-family="system-ui, sans-serif" font-size="14" fill="#d1d5db">Analyst Ratings</text>

    <rect x="-20" y="-18" width="120" height="36" rx="18" fill="#374151"/>
    <text x="40" y="7" font-family="system-ui, sans-serif" font-size="14" fill="#d1d5db">Earnings</text>

    <rect x="130" y="-18" width="100" height="36" rx="18" fill="#374151"/>
    <text x="180" y="7" font-family="system-ui, sans-serif" font-size="14" fill="#d1d5db">SWOT</text>

    <rect x="260" y="-18" width="100" height="36" rx="18" fill="#374151"/>
    <text x="310" y="7" font-family="system-ui, sans-serif" font-size="14" fill="#d1d5db">Charts</text>
  </g>

  <!-- URL -->
  <text x="600" y="560" font-family="system-ui, sans-serif" font-size="20" fill="#6b7280" text-anchor="middle">
    swot-analyse.vercel.app
  </text>

  <!-- Small accent bar at top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#green)"/>
</svg>

name: SonarCloud analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  pull-requests: read

jobs:
  Analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      # Backend tests with coverage
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run backend tests with coverage
        working-directory: backend
        run: |
          python -m pytest tests/ \
            --cov=services --cov=routers --cov=utils \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -v || true

      # Frontend tests with coverage
      - name: Set up Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps

      - name: Run frontend tests with coverage
        run: npx react-scripts test --coverage --watchAll=false --ci || true
        env:
          CI: true

      # SonarCloud scan
      - name: Analyze with SonarCloud
        uses: SonarSource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8 # v5
        with:
          args: >
            -Dsonar.projectKey=nishant-ranjan28_swot
            -Dsonar.organization=nishant-ranjan28
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
